

spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:

          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins: ${CORS_ALLOWED_ORIGINS}
                allowedHeaders: "*"
                allowedMethods: "*"
                allowCredentials: ${CORS_ALLOWED_CREDENTIALS}

          routes:

            - id: insper
              uri: https://www.insper.edu.br
              predicates:
                - Path=/insper/**

            - id: accounts
              uri: http://account:8080 # hostname da maquina
              predicates:
                - Path=/accounts/**

            - id: auth
              uri: http://auth:8080 # hostname da maquina
              predicates:
                - Path=/auth/**
      metrics:
        enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: info
    store: debug
    org.springframework.web: debug